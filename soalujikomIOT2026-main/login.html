<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk | Monitoring IoT</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <img src="img/logo.png" alt="Logo" />
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk untuk mengakses dashboard monitoring Anda</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="username" placeholder="nama@email.com" required />
        </div>
        <div class="form-group password-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••" required />
            <button type="button" class="toggle-pass-btn" onclick="togglePassword()">👁️</button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" /> Ingat saya
          </label>
          <a href="#" class="link">Lupa password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        <p id="loginMessage" class="form-message"></p>
        <p class="form-footer">Belum punya akun? <a href="#" class="link">Daftar di sini</a></p>
      </form>
    </div>

    <div class="login-art">
      <div class="art-content">
        <h2>Monitoring <br/>Lebih Cerdas</h2>
        <p>Pantau seluruh sensor IoT Anda dalam satu dashboard yang elegan dan modern.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
