<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Monitoring IoT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ===== RESET & ROOT VARIABLES ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --accent-color: #38bdf8;
      --accent-hover: #0ea5e9;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* ===== BACKGROUND ANIMATED ORBS ===== */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      opacity: 0.4;
      animation: float 8s infinite alternate;
    }
    .orb-1 {
      width: 300px;
      height: 300px;
      background: #06b6d4;
      top: -50px;
      left: -50px;
    }
    .orb-2 {
      width: 400px;
      height: 400px;
      background: #4f46e5;
      bottom: -100px;
      right: -100px;
      animation-delay: -4s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.1); }
    }

    /* ===== LOGIN CARD (GLASSMORPHISM) ===== */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    /* Logo & Header */
    .login-brand {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .login-brand i {
      font-size: 2rem;
      color: var(--accent-color);
      text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }
    .login-brand span {
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--text-main);
      letter-spacing: 0.5px;
    }
    .login-brand strong {
      color: var(--accent-color);
      font-weight: 700;
    }
    
    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 35px;
    }

    /* ===== FORM FIELDS ===== */
    .form-group {
      position: relative;
      margin-bottom: 25px;
      text-align: left;
    }

    .form-group i.input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: 0.3s;
    }

    .form-control {
      width: 100%;
      padding: 14px 45px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.25);
    }

    .form-control:focus + i.input-icon {
      color: var(--accent-color);
    }

    /* Toggle Password Visibility */
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-password:hover {
      color: var(--text-main);
    }

    /* Remember Me & Forgot Password */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .remember-me input {
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    .forgot-pass {
      color: var(--accent-color);
      text-decoration: none;
      transition: 0.2s;
    }
    .forgot-pass:hover {
      text-decoration: underline;
    }

    /* ===== ACTION BUTTON ===== */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent-color);
      color: #0f172a;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
    }

    /* Feedback Alert */
    .alert-msg {
      background: rgba(244, 63, 94, 0.15);
      border: 1px solid rgba(244, 63, 94, 0.3);
      color: #fda4af;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-container">
    <div class="login-card">
      
      <div class="login-brand">
        <i class="fa-solid fa-satellite-dish"></i>
        <span>Monitoring<strong>IoT</strong></span>
      </div>
      <p class="login-subtitle">Masukkan akun workspace IoT Anda untuk melanjutkan</p>

      <div class="alert-msg" id="alertBox">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="alertText">Email atau password salah!</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <input type="email" id="emailInput" class="form-control" placeholder="Nama Pengguna / Email" required />
          <i class="fa-solid fa-envelope input-icon"></i>
        </div>

        <div class="form-group">
          <input type="password" id="passwordInput" class="form-control" placeholder="Kata Sandi" required />
          <i class="fa-solid fa-lock input-icon"></i>
          <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" /> Ingat saya
          </label>
          <a href="#" class="forgot-pass">Lupa Password?</a>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span>Masuk ke Dashboard</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

    </div>
  </div>

  <script>
    // 1. Fungsi Mengintip Password (Show/Hide)
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('passwordInput');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
      }
    }

    // 2. Simulasi Proses Validasi Login Interaktif
    function handleLogin(event) {
      event.preventDefault(); // Mencegah refresh halaman bawaan browser
      
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const alertBox = document.getElementById('alertBox');
      const alertText = document.getElementById('alertText');
      const submitBtn = document.getElementById('submitBtn');

      // Tampilkan animasi loading singkat pada tombol login
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span>Memverifikasi...</span> <i class="fa-solid fa-spinner fa-spin"></i>`;
      alertBox.style.display = 'none';

      setTimeout(() => {
        // Logika validasi tiruan (silakan disesuaikan dengan kebutuhan asli)
        if (email === "admin@iot.com" && password === "admin123") {
          // Jika sukses, arahkan pengguna ke dashboard.html Anda
          window.location.href = "dashboard.html";
        } else {
          // Jika gagal, tampilkan alert box bawaan CSS di atas form
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<span>Masuk ke Dashboard</span> <i class="fa-solid fa-arrow-right"></i>`;
          
          alertText.innerText = "Email atau password salah! Coba admin@iot.com / admin123";
          alertBox.style.display = 'flex';
        }
      }, 1200); // Simulasi jeda loading jaringan 1.2 detik
    }
  </script>
</body>
</html>
